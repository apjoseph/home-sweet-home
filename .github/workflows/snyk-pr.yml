name: Snyk Merge Queue Scan

on:
  merge_group:
    branches:
      - main
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk:
    name: Snyk Code Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SNYK_TOKEN
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "SNYK_TOKEN is not configured. Add it as a repository secret."
            exit 1
          fi

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk Code test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --severity-threshold=high
